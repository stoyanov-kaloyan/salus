version: "3.9"

networks:
  salus-net:
    driver: bridge

volumes:
  salus-postgres-data:
  salus-proxy-certs:

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - salus-net
    volumes:
      - salus-postgres-data:/var/lib/postgresql/data
      - ./api/db/init/01-roles.sql:/docker-entrypoint-initdb.d/01-roles.sql:ro
      - ./api/db/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-salus}
      POSTGRES_USER: ${POSTGRES_USER:-salus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — copy .env.example to .env}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-salus} -d ${POSTGRES_DB:-salus}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # api runs natively on the host for Apple MPS GPU access.
  # Start it with: cd api && uvicorn api:app --host 0.0.0.0 --port 8000

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    restart: unless-stopped
    networks:
      - salus-net
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"

  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - salus-net
    ports:
      - "${PROXY_HOST_PORT:-8080}:8080"
    volumes:
      - salus-proxy-certs:/certs
    environment:
      DETECTION_API_URL: http://host.docker.internal:8000
      DETECTION_RECOGNIZERS: ${DETECTION_RECOGNIZERS:-deepfake,nsfw}
      MIN_IMAGE_BYTES: ${MIN_IMAGE_BYTES:-10240}
